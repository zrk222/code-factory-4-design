name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11","3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]" pytest
      - run: python -m pytest -q
      - name: template passes its own audit
        run: prestige audit references/premium-template.html --strict
      - name: counterfactual design challenge
        run: prestige challenge references/premium-template.html --purpose developer --workflow product

  render-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[render]"
      - run: python -m playwright install --with-deps chromium
      - run: prestige render-audit references/premium-template.html --out-dir .prestige/render
      - uses: actions/upload-artifact@v4
        with:
          name: prestige-render-proof
          path: .prestige/render
