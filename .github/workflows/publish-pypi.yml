name: publish-pypi

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Test and clean wheel smoke
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q
          python -m venv /tmp/prestige-wheel
          /tmp/prestige-wheel/bin/python -m pip install dist/*.whl
          /tmp/prestige-wheel/bin/prestige scaffold /tmp/premium-template.html
          /tmp/prestige-wheel/bin/prestige install codex --root /tmp/prestige-agent
      - name: Attach distributions
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
      - name: Publish to PyPI
        # Temporary encrypted-token fallback. Replace with pure OIDC after
        # PyPI Trusted Publishing is configured for this repository.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          username: __token__
          password: ${{ secrets.PYPI_TOKEN }}
